# flatten.cfg — project file list for flatten.py
# Run:  make flatten   (or  python3 tools/flatten.py)
#
# Rules:
#   - Order matters: types and hardware before game code
#   - List BOTH .h and .c for each module
#   - .h before .c within each module
#   - main.c always last
#
# To add a new module: add its .h then .c in the right section below.

output: work/flattened.c

# System includes to keep (all others stripped)
keep_includes:
    <stdint.h>
    <stdlib.h>
    <string.h>
    <stdbool.h>

files:
    address_map.h
    # ── Hardware layer ────────────────────────────────────────────────────
    src/hardware/vga.h
    src/hardware/vga.c
    src/hardware/timer.h
    src/hardware/timer.c
    src/hardware/keyboard.h
    src/hardware/keyboard.c
    src/hardware/audio.h
    src/hardware/audio.c

    # ── Assets ────────────────────────────────────────────────────────────
    src/assets/tile_sprites.h
    src/assets/tile_sprites.c
    src/assets/player_sprites.h
    src/assets/player_sprites.c
    src/assets/soldier_frames.h
    src/assets/soldier_frames.c
    src/assets/decoration_sprites.h
    src/assets/decoration_sprites.c

    # ── Core types ────────────────────────────────────────────────────────
    src/game/sprite.h
    src/game/sprite.c
    src/engine/animator.h
    src/engine/animator.c
    # ── Game systems ──────────────────────────────────────────────────────
    src/game/map.h
    src/game/map.c
    src/game/player_config.h
    src/game/entity.h
    src/game/entity.c
    src/game/player.h
    src/game/player.c
    src/game/enemy.h
    src/game/enemy.c
    src/game/projectile.h
    src/game/projectile.c

    # ── Engine ────────────────────────────────────────────────────────────
    src/engine/decorations.h 
    src/engine/decorations.c
    src/engine/collision.h
    src/engine/collision.c
    src/engine/renderer.h
    src/engine/renderer.c

    # ── AI ────────────────────────────────────────────────────────────────
    src/ai/ai.h
    src/ai/ai.c

    # ── Top level ─────────────────────────────────────────────────────────
    src/game/game.h
    src/game/game.c
    src/main.c